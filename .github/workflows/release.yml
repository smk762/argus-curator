name: Release to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test-install:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install wheel and smoke-test import
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install dist/*.whl
          uv run --no-sync python -c "from argus_curator import scan_folder, __version__; print(f'argus-curator {__version__} OK')"
      # The base import never touches server/app.py, so it cannot catch a broken
      # server dependency edge (argus-cortex is resolved from PyPI at install
      # time and can move between the last green CI run and a tag push). Import
      # the server module too, so a missing or renamed argus_cortex.server fails
      # here rather than on the user's first `argus-curator serve`.
      - name: Smoke-test the server extra
        run: |
          uv pip install "$(echo dist/*.whl)[server]"
          uv run --no-sync python -c "from argus_curator.server.app import create_app; create_app(); print('argus-curator[server] OK')"

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: test-install
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    runs-on: ubuntu-latest
    # Ordered *after* the TestPyPI rehearsal so its outcome is visible first, but
    # deliberately not gated on it. A TestPyPI-only fault — a missing trusted
    # publisher, an index outage — must not silently withhold the real release:
    # that failure mode shipped argus-proof images for two tags with no wheel on
    # PyPI, and nothing surfaced it because publish-image is independent.
    # Only the build + install gate is required; a TestPyPI failure still marks
    # the whole run failed, so the problem stays loud.
    needs: [test-install, publish-testpypi]
    if: "!cancelled() && needs.test-install.result == 'success'"
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-image:
    runs-on: ubuntu-latest
    needs: test-install
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/argus-curator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      # The base image has no git, so pass the version in via build-arg
      # (SETUPTOOLS_SCM_PRETEND_VERSION) rather than relying on .git history.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
